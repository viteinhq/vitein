name: Bug report
description: Report something that's broken
title: '[Bug]: '
labels: ['bug', 'triage']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill in as much as you can.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
      placeholder: When I click X, Y happens instead of Z.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Where did this happen?
      options:
        - Web (vite.in)
        - iOS app
        - Android app
        - API (direct call)
        - MCP server
        - Not sure
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
      placeholder: e.g. v0.3.1 or commit sha
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: Browser / OS / device, locale, anything relevant.
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      render: shell
  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      options:
        - label: I agree to follow this project's [Code of Conduct](../blob/main/CODE_OF_CONDUCT.md).
          required: true
