name: Accessibility audit

# Manual + post-deploy. Mirror of lighthouse.yml — same cadence
# (we don't want a11y to silently regress between launches).
on:
  workflow_dispatch:
  schedule:
    # Daily at 06:30 UTC — 30 min after Lighthouse so logs don't
    # interleave in the morning issues feed.
    - cron: '30 6 * * *'
  workflow_run:
    workflows: ['Deploy']
    types: [completed]
    branches: [main]

permissions:
  contents: read
  issues: write

jobs:
  axe:
    name: axe-core → next.vite.in
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Wait for staging deploy to settle
        if: github.event_name == 'workflow_run'
        run: sleep 30

      - name: Install Chromium (for headless axe runs)
        run: pnpm exec playwright install --with-deps chromium

      - name: Run axe-core audit
        run: node scripts/run-axe-audit.mjs https://next.vite.in

      - name: Update rolling a11y tracker issue
        if: failure()
        uses: actions/github-script@v9
        with:
          script: |
            const { owner, repo } = context.repo;
            const sha = context.sha;
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;

            try {
              await github.rest.issues.getLabel({ owner, repo, name: 'a11y-regression' });
            } catch (err) {
              if (err.status === 404) {
                await github.rest.issues.createLabel({
                  owner,
                  repo,
                  name: 'a11y-regression',
                  color: '5319e7',
                  description: 'axe-core found accessibility violations.',
                });
              } else {
                throw err;
              }
            }

            // Find the existing open tracker (one canonical issue per the
            // 2026-05-27 sweep). If none exists, open a fresh tracker; if
            // multiple exist, comment on the oldest (least likely to be a
            // duplicate that itself needs cleaning up).
            const open = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: 'open',
              labels: 'a11y-regression',
              per_page: 100,
            });
            // Exclude PRs — listForRepo returns both.
            const trackers = open.filter((i) => !i.pull_request).sort((a, b) => a.number - b.number);

            const commentBody = [
              `axe-core still failing on \`${sha.slice(0, 7)}\`.`,
              ``,
              `**Run:** ${runUrl}`,
              ``,
              `See the run log for the current rule + node list.`,
            ].join('\n');

            if (trackers.length === 0) {
              await github.rest.issues.create({
                owner,
                repo,
                title: `a11y: rolling tracker — axe-core violations`,
                body: [
                  `axe-core surfaced WCAG violations on next.vite.in.`,
                  ``,
                  commentBody,
                  ``,
                  `This is the canonical rolling tracker; the workflow will`,
                  `comment here on subsequent failures instead of opening`,
                  `new issues.`,
                ].join('\n'),
                labels: ['a11y-regression'],
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: trackers[0].number,
                body: commentBody,
              });
            }
