name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    name: Lint, typecheck, build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Lint OpenAPI spec
        run: pnpm -F @vitein/openapi-spec lint

      - name: i18n key parity
        # Every locale must carry the same key set as `en` — a missing
        # key ships a silent English fallback. Catches half-translated
        # locales before merge.
        run: node scripts/check-i18n-completeness.mjs

      - name: SDK drift check (spec vs generated)
        run: pnpm gen:sdk:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Web bundle-size budget
        # Catches gross regressions before they hit staging. Lighthouse CI
        # (.github/workflows/lighthouse.yml) covers the real-network
        # numbers post-deploy.
        run: node scripts/check-web-bundle-size.mjs

      - name: Test
        run: pnpm test
