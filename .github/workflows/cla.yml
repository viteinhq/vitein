name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-signatures: signatures/v1/cla.json
          path-to-document: https://github.com/viteinhq/vitein/blob/main/CLA.md
          branch: cla-signatures
          allowlist: leuk80,dependabot[bot],renovate[bot]
          custom-notsigned-prcomment: |
            Thanks for the PR! Before we can review it we need you to sign the
            [Contributor License Agreement](https://github.com/viteinhq/vitein/blob/main/CLA.md).
            Please post the following comment on this PR to sign:
          custom-pr-sign-comment: I have read the CLA Document and I hereby sign the CLA
          custom-allsigned-prcomment: All contributors have signed the CLA. Thank you!
