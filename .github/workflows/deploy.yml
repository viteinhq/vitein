name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

env:
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  # Sentry source-map upload reads these. Each step skips itself when
  # SENTRY_AUTH_TOKEN is empty (e.g. before the Sentry org is set up).
  SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
  SENTRY_ORG: ${{ vars.SENTRY_ORG }}

jobs:
  migrate-staging:
    name: Migrate staging DB
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Drizzle migrations are applied to the staging Neon branch before the
    # API deploys, so new code never reaches a Worker ahead of its schema.
    # The step self-skips until STAGING_DATABASE_URL is configured, so this
    # job does not block staging deploys before the secret exists.
    env:
      DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Apply Drizzle migrations to the staging branch
        if: env.DATABASE_URL != ''
        run: pnpm -F @vitein/db-schema db:migrate

  deploy-api:
    name: API → staging
    needs: [migrate-staging]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Compute build stamp
        id: stamp
        run: echo "stamp=$(date -u +%Y-%m-%dT%H:%MZ)" >> "$GITHUB_OUTPUT"
      - name: Build API bundle (for source-map upload)
        run: |
          pnpm -F @vitein/api exec wrangler deploy --env staging --dry-run \
            --outdir .wrangler/dist-staging \
            --var BUILD_SHA:${{ github.sha }} \
            --var BUILD_STAMP:${{ steps.stamp.outputs.stamp }}
      - name: Upload API source maps to Sentry
        if: env.SENTRY_AUTH_TOKEN != '' && vars.SENTRY_PROJECT_API != ''
        run: |
          pnpm dlx @sentry/cli releases new ${{ github.sha }} \
            --org "$SENTRY_ORG" --project "${{ vars.SENTRY_PROJECT_API }}"
          pnpm dlx @sentry/cli sourcemaps upload .wrangler/dist-staging \
            --release ${{ github.sha }} \
            --org "$SENTRY_ORG" --project "${{ vars.SENTRY_PROJECT_API }}"
          pnpm dlx @sentry/cli releases finalize ${{ github.sha }} \
            --org "$SENTRY_ORG" --project "${{ vars.SENTRY_PROJECT_API }}"
      - name: Deploy API
        run: |
          pnpm -F @vitein/api exec wrangler deploy --env staging \
            --var BUILD_SHA:${{ github.sha }} \
            --var BUILD_STAMP:${{ steps.stamp.outputs.stamp }}

  deploy-mcp:
    name: MCP → staging
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build MCP bundle (for source-map upload)
        run: |
          pnpm -F @vitein/mcp exec wrangler deploy --env staging --dry-run \
            --outdir .wrangler/dist-staging \
            --var BUILD_SHA:${{ github.sha }}
      - name: Upload MCP source maps to Sentry
        if: env.SENTRY_AUTH_TOKEN != '' && vars.SENTRY_PROJECT_MCP != ''
        run: |
          pnpm dlx @sentry/cli releases new ${{ github.sha }} \
            --org "$SENTRY_ORG" --project "${{ vars.SENTRY_PROJECT_MCP }}"
          pnpm dlx @sentry/cli sourcemaps upload .wrangler/dist-staging \
            --release ${{ github.sha }} \
            --org "$SENTRY_ORG" --project "${{ vars.SENTRY_PROJECT_MCP }}"
          pnpm dlx @sentry/cli releases finalize ${{ github.sha }} \
            --org "$SENTRY_ORG" --project "${{ vars.SENTRY_PROJECT_MCP }}"
      - name: Deploy MCP
        run: |
          pnpm -F @vitein/mcp exec wrangler deploy --env staging \
            --var BUILD_SHA:${{ github.sha }}

  deploy-web:
    name: Web → Pages (staging)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build Web
        env:
          BUILD_SHA: ${{ github.sha }}
        run: pnpm -F @vitein/web build
      - name: Upload Web source maps to Sentry
        if: env.SENTRY_AUTH_TOKEN != '' && vars.SENTRY_PROJECT_WEB != ''
        run: |
          pnpm dlx @sentry/cli releases new ${{ github.sha }} \
            --org "$SENTRY_ORG" --project "${{ vars.SENTRY_PROJECT_WEB }}"
          pnpm dlx @sentry/cli sourcemaps upload apps/web/.svelte-kit/cloudflare \
            --release ${{ github.sha }} \
            --org "$SENTRY_ORG" --project "${{ vars.SENTRY_PROJECT_WEB }}"
          pnpm dlx @sentry/cli releases finalize ${{ github.sha }} \
            --org "$SENTRY_ORG" --project "${{ vars.SENTRY_PROJECT_WEB }}"
      # Cloudflare Pages rejects commit messages whose body contains some
      # shell-metachar sequences as "invalid UTF-8" (e.g. `$<…>`). Pass an
      # ASCII-only subject from the SHA so the deploy always accepts.
      - run: |
          pnpm -F @vitein/web exec wrangler pages deploy .svelte-kit/cloudflare \
            --project-name=vitein-web-staging \
            --branch=main \
            --commit-message="deploy ${{ github.sha }}" \
            --commit-hash="${{ github.sha }}"

  # Opens a GitHub Issue when any of the deploy jobs above failed. This is
  # the safety net against the silent-failure scenario from 2026-05-12 where
  # two consecutive deploys broke on a Node-version mismatch and nobody
  # noticed for hours. Re-uses one open issue per commit to avoid noise.
  notify-failure:
    name: Open issue on deploy failure
    needs: [migrate-staging, deploy-api, deploy-mcp, deploy-web]
    if: failure()
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/github-script@v9
        with:
          script: |
            const { owner, repo } = context.repo;
            const sha = context.sha;
            const shortSha = sha.slice(0, 7);
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;

            // Ensure the label exists (idempotent).
            try {
              await github.rest.issues.getLabel({ owner, repo, name: 'deploy-failure' });
            } catch (err) {
              if (err.status === 404) {
                await github.rest.issues.createLabel({
                  owner,
                  repo,
                  name: 'deploy-failure',
                  color: 'd93f0b',
                  description: 'Automated alert: a deploy.yml job failed.',
                });
              } else {
                throw err;
              }
            }

            const title = `Deploy failed: ${shortSha}`;
            const body = [
              `Deploy workflow run **failed** for commit \`${sha}\`.`,
              ``,
              `**Run:** ${runUrl}`,
              `**Triggered by:** \`${context.eventName}\` on \`${context.ref}\``,
              ``,
              `Open the run linked above to see which of \`migrate-staging\`, \`deploy-api\`, \`deploy-mcp\`, \`deploy-web\` turned red.`,
              ``,
              `Staging may be running stale code until the next successful deploy. See \`docs/ops/runbook.md\` → Worker rollback.`,
            ].join('\n');

            // De-dupe: if an open issue already exists for this SHA, comment
            // on it instead of opening a duplicate.
            const existing = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open',
              labels: 'deploy-failure',
              per_page: 50,
            });
            const dup = existing.data.find((i) => i.title === title);

            if (dup) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: dup.number,
                body: `Another deploy attempt failed on the same commit: ${runUrl}`,
              });
            } else {
              await github.rest.issues.create({
                owner,
                repo,
                title,
                body,
                labels: ['deploy-failure'],
              });
            }
