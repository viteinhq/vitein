name: Migrate production DB

# Production migrations are deliberately manual — never on push. Trigger this
# from the Actions tab after reviewing the pending migration SQL, and before
# deploying API code that depends on the new schema.
#
# The `production` environment gate means the run pauses for approval when a
# required reviewer is configured on that environment (repo Settings →
# Environments → production).
on:
  workflow_dispatch:

concurrency:
  group: migrate-prod
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  migrate:
    name: Apply migrations to production
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production
    env:
      DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Apply Drizzle migrations to the production branch
        run: pnpm -F @vitein/db-schema db:migrate
