name = "vitein-api-dev"
main = "src/index.ts"
account_id = "00c62b23eb691ac4c5fffe0b2e429a77"
compatibility_date = "2026-04-19"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

# Hourly cron picks up due reminders.
[triggers]
crons = ["0 * * * *"]

# Rate-limiter Durable Object — one instance per derived key.
[[durable_objects.bindings]]
name = "RATE_LIMITER"
class_name = "RateLimiter"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RateLimiter"]

[vars]
ENVIRONMENT = "dev"
VAPID_PUBLIC_KEY = "BIz6XBXWf_mMPFa-QOSjPkX2qQgY-dZCeqiDtLppStD3qMRg-OlUX5sRwPNYUziWUEvj1KkDBI4gPADO1h2wgSM"

# Staging: deployed from main branch
[env.staging]
name = "vitein-api-staging"
routes = [{ pattern = "api-staging.vite.in", custom_domain = true }]

[env.staging.vars]
ENVIRONMENT = "staging"
WEB_BASE_URL = "https://next.vite.in"
MEDIA_PUBLIC_BASE_URL = "https://media-staging.vite.in"
VAPID_PUBLIC_KEY = "BIz6XBXWf_mMPFa-QOSjPkX2qQgY-dZCeqiDtLppStD3qMRg-OlUX5sRwPNYUziWUEvj1KkDBI4gPADO1h2wgSM"

[[env.staging.durable_objects.bindings]]
name = "RATE_LIMITER"
class_name = "RateLimiter"

[[env.staging.r2_buckets]]
binding = "R2_MEDIA"
bucket_name = "vitein-media-staging"

# Postgres connection pooled at the edge via Hyperdrive — see ADR 0008.
[[env.staging.hyperdrive]]
binding = "HYPERDRIVE"
id = "063ef21041c44b0083f6466dbcd9b7f1"

# Email delivery queue — producer + consumer are the same Worker.
[[env.staging.queues.producers]]
binding = "QUEUE_EMAIL"
queue = "vitein-email-staging"

[[env.staging.queues.consumers]]
queue = "vitein-email-staging"
max_retries = 3

# Web Push delivery queue.
[[env.staging.queues.producers]]
binding = "QUEUE_PUSH"
queue = "vitein-push-staging"

[[env.staging.queues.consumers]]
queue = "vitein-push-staging"
max_retries = 3

[env.staging.triggers]
crons = ["0 * * * *"]

# Production: deployed from tagged releases
[env.production]
name = "vitein-api"
routes = [{ pattern = "api.vite.in", custom_domain = true }]

[env.production.vars]
ENVIRONMENT = "production"
WEB_BASE_URL = "https://vite.in"
MEDIA_PUBLIC_BASE_URL = "https://media.vite.in"
VAPID_PUBLIC_KEY = "BIz6XBXWf_mMPFa-QOSjPkX2qQgY-dZCeqiDtLppStD3qMRg-OlUX5sRwPNYUziWUEvj1KkDBI4gPADO1h2wgSM"

[[env.production.durable_objects.bindings]]
name = "RATE_LIMITER"
class_name = "RateLimiter"

[[env.production.r2_buckets]]
binding = "R2_MEDIA"
bucket_name = "vitein-media"

# Postgres connection pooled at the edge via Hyperdrive — see ADR 0008.
[[env.production.hyperdrive]]
binding = "HYPERDRIVE"
id = "e6c2d8110c624335b03e59bfbe46c25e"

# Email delivery queue — producer + consumer are the same Worker.
[[env.production.queues.producers]]
binding = "QUEUE_EMAIL"
queue = "vitein-email"

[[env.production.queues.consumers]]
queue = "vitein-email"
max_retries = 3

# Web Push delivery queue.
[[env.production.queues.producers]]
binding = "QUEUE_PUSH"
queue = "vitein-push"

[[env.production.queues.consumers]]
queue = "vitein-push"
max_retries = 3

[env.production.triggers]
crons = ["0 * * * *"]

# Secrets (DATABASE_URL, SENTRY_DSN, STRIPE_SECRET_KEY, RESEND_API_KEY, etc.)
# are set per environment via:
#   wrangler secret put <NAME> --env staging
#   wrangler secret put <NAME> --env production
# For local dev, put them in apps/api/.dev.vars (gitignored).
