name = "vitein-api-dev"
main = "src/index.ts"
account_id = "00c62b23eb691ac4c5fffe0b2e429a77"
compatibility_date = "2026-04-19"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

# Hourly cron picks up due reminders.
[triggers]
crons = ["0 * * * *"]

# Rate-limiter Durable Object — one instance per derived key.
[[durable_objects.bindings]]
name = "RATE_LIMITER"
class_name = "RateLimiter"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RateLimiter"]

[vars]
ENVIRONMENT = "dev"

# Staging: deployed from main branch
[env.staging]
name = "vitein-api-staging"
routes = [{ pattern = "api-staging.vite.in", custom_domain = true }]

[env.staging.vars]
ENVIRONMENT = "staging"
WEB_BASE_URL = "https://next.vite.in"
MEDIA_PUBLIC_BASE_URL = "https://pub-4c3170ac577242ecb93c48b1c189e207.r2.dev"

[[env.staging.durable_objects.bindings]]
name = "RATE_LIMITER"
class_name = "RateLimiter"

[[env.staging.r2_buckets]]
binding = "R2_MEDIA"
bucket_name = "vitein-media-staging"

[env.staging.triggers]
crons = ["0 * * * *"]

# Production: deployed from tagged releases
[env.production]
name = "vitein-api"
routes = [{ pattern = "api.vite.in", custom_domain = true }]

[env.production.vars]
ENVIRONMENT = "production"
WEB_BASE_URL = "https://vite.in"

[[env.production.durable_objects.bindings]]
name = "RATE_LIMITER"
class_name = "RateLimiter"

[[env.production.r2_buckets]]
binding = "R2_MEDIA"
bucket_name = "vitein-media"

[env.production.triggers]
crons = ["0 * * * *"]

# Secrets (DATABASE_URL, SENTRY_DSN, STRIPE_SECRET_KEY, RESEND_API_KEY, etc.)
# are set per environment via:
#   wrangler secret put <NAME> --env staging
#   wrangler secret put <NAME> --env production
# For local dev, put them in apps/api/.dev.vars (gitignored).
