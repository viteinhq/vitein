name = "vitein-mcp-dev"
main = "src/index.ts"
account_id = "00c62b23eb691ac4c5fffe0b2e429a77"
compatibility_date = "2026-04-19"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

[vars]
ENVIRONMENT = "dev"
API_BASE_URL = "http://localhost:8787"

[env.staging]
name = "vitein-mcp-staging"
routes = [{ pattern = "mcp-staging.vite.in", custom_domain = true }]

[env.staging.vars]
ENVIRONMENT = "staging"
API_BASE_URL = "https://api-staging.vite.in"

[env.production]
name = "vitein-mcp"
routes = [{ pattern = "mcp.vite.in", custom_domain = true }]

[env.production.vars]
ENVIRONMENT = "production"
API_BASE_URL = "https://api.vite.in"
