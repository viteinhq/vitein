<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline — vite.in</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f1eee7;
        color: #0a0a0a;
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        text-align: center;
        padding: 24px;
      }
      .box {
        max-width: 22rem;
      }
      h1 {
        font-size: 1.5rem;
        margin: 0 0 0.5rem;
        letter-spacing: -0.02em;
      }
      p {
        color: #6b6863;
        line-height: 1.5;
        margin: 0;
      }
      .dot {
        display: inline-block;
        width: 0.55rem;
        height: 0.55rem;
        border-radius: 50%;
        background: #ff5436;
        vertical-align: middle;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <h1>You're offline <span class="dot"></span></h1>
      <p>vite.in needs a connection right now. Check your network and try again.</p>
    </div>
  </body>
</html>
