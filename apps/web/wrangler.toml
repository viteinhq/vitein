name = "vitein-web-staging"
pages_build_output_dir = ".svelte-kit/cloudflare"
compatibility_date = "2026-04-19"
compatibility_flags = ["nodejs_compat"]

# Cloudflare Pages treats the project's production branch as the
# "production" environment, so for this Pages project — which serves
# next.vite.in — every env block here points at the staging API.
# Real production (vite.in) lives in a separate Pages project
# (`vitein-web`); its wrangler.toml will override these values.

[vars]
API_BASE_URL = "https://api-staging.vite.in"

[env.preview.vars]
API_BASE_URL = "https://api-staging.vite.in"

[env.production.vars]
API_BASE_URL = "https://api-staging.vite.in"
