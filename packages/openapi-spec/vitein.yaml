openapi: 3.1.0
info:
  title: vite.in API
  version: 0.1.0
  license:
    name: AGPL-3.0-or-later
    url: https://www.gnu.org/licenses/agpl-3.0.html
  description: |
    The Core API for vite.in. One API, consumed by the web app, iOS, Android,
    and the MCP server for LLM agents.

    **This spec is the source of truth.** Every endpoint is added to this file
    first, then implemented. The TypeScript SDK (`@vitein/ts-sdk`) is
    regenerated from this file on every change. CI fails if they drift.

servers:
  - url: https://api-staging.vite.in
    description: Staging (tracks main branch)
  - url: https://api.vite.in
    description: Production (tagged releases only)
  - url: http://localhost:8787
    description: Local dev (wrangler dev)

tags:
  - name: system
    description: Health checks and operational endpoints.
  - name: events
    description: Event lifecycle — create, read, update, delete.
  - name: rsvps
    description: RSVPs — public submission and creator-scoped listing.
  - name: guests
    description: Invite list — creator-managed.
  - name: users
    description: Authenticated user profile, event list, export, deletion.
  - name: auth
    description: Authentication — Better-Auth endpoints and event claim.

paths:
  /v1/health:
    get:
      operationId: getHealth
      summary: Health check
      description: |
        Returns service health including database connectivity. Used by CI,
        uptime monitors, and the `/v1/health` smoke test in `apps/api`.
      tags: [system]
      responses:
        '200':
          description: Service is reachable; database status is reported in the body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /v1/events:
    post:
      operationId: createEvent
      summary: Create an event (anonymous)
      description: |
        Creates an event without requiring a user account. Returns the public
        event view plus a one-time **creator token** delivered to the
        creator's email as a magic link. The token in the response body is
        intended for client confirmation only — clients should not persist it.
      tags: [events]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EventCreateInput'
      responses:
        '201':
          description: Event created; magic-link email dispatched to creator.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventCreateResponse'
        '400':
          $ref: '#/components/responses/ValidationError'

  /v1/events/by-slug/{slug}:
    parameters:
      - name: slug
        in: path
        required: true
        schema: { type: string, minLength: 1, maxLength: 64 }
        description: Event slug (random base32 by default, custom for paid events).
    get:
      operationId: getEventBySlug
      summary: Resolve an event by its URL slug
      description: |
        Public endpoint — no auth. Useful for web clients that route by
        `/e/{slug}`: they call this to resolve the event and then use the
        returned `id` for creator-scoped calls.
      tags: [events]
      responses:
        '200':
          description: Public event view.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EventPublic' }
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/events/by-slug/{slug}/ics:
    parameters:
      - name: slug
        in: path
        required: true
        schema: { type: string, minLength: 1, maxLength: 64 }
    get:
      operationId: getEventIcs
      summary: Download an iCalendar file for the event
      description: |
        Returns a single-event iCalendar (RFC 5545) document. All timestamps
        are UTC (`Z`-suffixed); clients apply the user's local zone on display.
      tags: [events]
      responses:
        '200':
          description: iCalendar payload.
          content:
            text/calendar:
              schema: { type: string }
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/events/{id}:
    parameters:
      - $ref: '#/components/parameters/EventId'
    get:
      operationId: getEvent
      summary: Get the public view of an event
      description: |
        Returns fields safe to share publicly. Password-protected events
        return only minimal metadata until the password is supplied via a
        future endpoint.
      tags: [events]
      responses:
        '200':
          description: Public event view.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventPublic'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      operationId: updateEvent
      summary: Update an event (creator only)
      tags: [events]
      parameters:
        - $ref: '#/components/parameters/CreatorTokenHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EventUpdateInput'
      responses:
        '200':
          description: Updated event (creator view).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventManage'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: deleteEvent
      summary: Soft-delete an event (creator only)
      tags: [events]
      parameters:
        - $ref: '#/components/parameters/CreatorTokenHeader'
      responses:
        '204':
          description: Event soft-deleted.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/events/{id}/manage:
    parameters:
      - $ref: '#/components/parameters/EventId'
      - $ref: '#/components/parameters/CreatorTokenHeader'
    get:
      operationId: getEventManage
      summary: Get the creator view of an event
      description: Returns all fields including private ones (paid_features, paymentRef, etc.).
      tags: [events]
      responses:
        '200':
          description: Creator-scoped event view.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventManage'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/events/{id}/rsvps:
    parameters:
      - $ref: '#/components/parameters/EventId'
    post:
      operationId: submitRsvp
      summary: Submit an RSVP (public)
      description: |
        No authentication required — anyone with the event link can RSVP.
        An email is optional; if provided, a confirmation is dispatched.
      tags: [rsvps]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RsvpInput'
      responses:
        '201':
          description: RSVP recorded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Rsvp'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFound'
    get:
      operationId: listRsvps
      summary: List RSVPs for an event (creator only)
      tags: [rsvps]
      parameters:
        - $ref: '#/components/parameters/CreatorTokenHeader'
      responses:
        '200':
          description: RSVP list.
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/Rsvp' }
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/events/{id}/guests:
    parameters:
      - $ref: '#/components/parameters/EventId'
      - $ref: '#/components/parameters/CreatorTokenHeader'
    post:
      operationId: addGuest
      summary: Add a guest to the invite list (creator only)
      tags: [guests]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GuestInput'
      responses:
        '201':
          description: Guest added.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Guest'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
    get:
      operationId: listGuests
      summary: List invited guests (creator only)
      tags: [guests]
      responses:
        '200':
          description: Guest list.
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/Guest' }
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/events/{id}/media:
    parameters:
      - $ref: '#/components/parameters/EventId'
    post:
      operationId: uploadMedia
      summary: Upload a media asset for the event (creator only)
      description: |
        Body is the raw image bytes. `Content-Type` should hint the MIME
        but the server sniffs magic numbers and only trusts the sniffed
        type. Accepted types: JPEG, PNG, WebP, GIF, AVIF. Max 10 MiB. Max
        10 items per event.
      tags: [events]
      parameters:
        - $ref: '#/components/parameters/CreatorTokenHeader'
        - name: kind
          in: query
          schema: { type: string, enum: [cover, gallery], default: cover }
      requestBody:
        required: true
        content:
          image/jpeg:
            schema: { type: string, format: binary }
          image/png:
            schema: { type: string, format: binary }
          image/webp:
            schema: { type: string, format: binary }
          image/gif:
            schema: { type: string, format: binary }
          image/avif:
            schema: { type: string, format: binary }
      responses:
        '201':
          description: Media stored.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Media' }
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: Quota exceeded (10 media per event).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
    get:
      operationId: listMedia
      summary: List media attached to an event (public)
      tags: [events]
      responses:
        '200':
          description: Media list.
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/Media' }
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/events/{id}/media/{mediaId}:
    parameters:
      - $ref: '#/components/parameters/EventId'
      - $ref: '#/components/parameters/CreatorTokenHeader'
      - name: mediaId
        in: path
        required: true
        schema: { type: string, format: uuid }
    delete:
      operationId: deleteMedia
      summary: Delete an event media asset (creator only)
      tags: [events]
      responses:
        '204':
          description: Deleted.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/events/{id}/checkout:
    parameters:
      - $ref: '#/components/parameters/EventId'
      - $ref: '#/components/parameters/CreatorTokenHeader'
    post:
      operationId: createCheckout
      summary: Start a Stripe Checkout Session to upgrade to premium (creator only)
      description: |
        Creates a Stripe hosted Checkout Session for the requested tier and
        currency and returns its public URL. The client redirects the
        creator there; the event is marked `isPaid` only when Stripe
        delivers `checkout.session.completed` to `/v1/webhooks/stripe`.

        Tiers: **basic** (no_branding, custom_slug, reminders) vs **plus**
        (adds plus_ones, password_protected, save_the_date). Currency
        defaults to `EUR`. All launch currencies are fixed anchors, not
        FX-converted — see ARCHITECTURE §12.
      tags: [events]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tier]
              properties:
                tier:
                  type: string
                  enum: [basic, plus]
                  description: Premium tier to bill for.
                currency:
                  type: string
                  enum: [EUR, USD, CHF, GBP]
                  default: EUR
                  description: Currency anchor to bill in. Maps to a configured Stripe Price.
      responses:
        '200':
          description: Checkout session URL.
          content:
            application/json:
              schema:
                type: object
                required: [url]
                properties:
                  url:
                    type: string
                    format: uri
                    description: Stripe-hosted Checkout Session URL.
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Event is already marked as paid.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '503':
          description: Stripe is not configured for this (tier, currency) pair.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /v1/events/{id}/reminders/send:
    parameters:
      - $ref: '#/components/parameters/EventId'
      - $ref: '#/components/parameters/CreatorTokenHeader'
    post:
      operationId: sendReminder
      summary: Queue an immediate reminder (creator only)
      description: |
        Inserts a `manual` reminder row scheduled for now. The hourly cron
        picks it up on its next run and dispatches the email. The endpoint
        returns immediately; the actual send is asynchronous.
      tags: [events]
      responses:
        '202':
          description: Reminder queued.
          content:
            application/json:
              schema:
                type: object
                required: [id, eventId, scheduledAt, kind]
                properties:
                  id: { type: string, format: uuid }
                  eventId: { type: string, format: uuid }
                  scheduledAt: { type: string, format: date-time }
                  kind: { type: string }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/users/me:
    get:
      operationId: getMe
      summary: Get the authenticated user's profile
      tags: [users]
      responses:
        '200':
          description: Current user.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserProfile' }
        '401':
          $ref: '#/components/responses/Unauthorized'
    delete:
      operationId: deleteMe
      summary: Soft-delete the authenticated user (30-day grace)
      description: |
        Marks the user as deleted. Grace period is 30 days — during that
        window the account can be restored by contacting support. After the
        grace, a cron job hard-deletes rows. Creator-token access to the
        user's anonymously-created events is unaffected.
      tags: [users]
      responses:
        '204':
          description: Account soft-deleted.
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/users/me/events:
    get:
      operationId: getMyEvents
      summary: List events owned by the authenticated user
      tags: [users]
      responses:
        '200':
          description: Events claimed or created while signed in.
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/EventPublic' }
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/users/me/audit:
    get:
      operationId: getMyAudit
      summary: Recent audit entries for events owned by the user
      description: |
        Scoped by event ownership, not by `actor_id`, so historical rows that
        predate the user's sign-in (auto-claim) are still returned.
      tags: [users]
      responses:
        '200':
          description: Audit entries.
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/AuditEntry' }
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/users/me/export:
    get:
      operationId: exportMe
      summary: GDPR data export
      description: Returns a JSON bundle of all data tied to the authenticated user.
      tags: [users]
      responses:
        '200':
          description: Data export bundle.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserExport' }
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/auth/claim:
    post:
      operationId: claimEvents
      summary: Link anonymously-created events to the authenticated user
      description: |
        Finds all non-deleted events whose `creatorEmail` matches the
        authenticated user's email and sets `creator_user_id` on them. Safe
        to call repeatedly; already-claimed events are skipped.
      tags: [auth]
      responses:
        '200':
          description: Claim summary.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ClaimResponse' }
        '401':
          $ref: '#/components/responses/Unauthorized'

components:
  parameters:
    EventId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Server-generated UUIDv7 of the event.
    CreatorTokenHeader:
      name: X-Creator-Token
      in: header
      required: true
      schema:
        type: string
      description: |
        Plaintext creator token (the value delivered by the magic-link email).
        The server hashes it and compares against `event_tokens.token_hash`.

  schemas:
    HealthResponse:
      type: object
      required: [status, environment, db, ts]
      properties:
        status:
          type: string
          enum: [ok]
          description: Always `ok` while the Worker can serve requests.
        environment:
          type: string
          enum: [dev, staging, production]
          description: Which Worker environment answered.
        db:
          type: string
          enum: [connected, unavailable, error]
          description: |
            - `connected` — `SELECT 1` succeeded.
            - `unavailable` — `DATABASE_URL` not configured (expected in local dev without Neon).
            - `error` — connection attempt failed.
        ts:
          type: string
          format: date-time
          description: Server's clock at the moment the response was built.
      example:
        status: ok
        environment: staging
        db: connected
        ts: '2026-04-19T18:00:00.000Z'

    EventCreateInput:
      type: object
      required: [title, startsAt, timezone, creatorEmail]
      properties:
        title: { type: string, minLength: 1, maxLength: 200 }
        description: { type: [string, 'null'], maxLength: 5000 }
        startsAt: { type: string, format: date-time }
        endsAt: { type: [string, 'null'], format: date-time }
        timezone:
          type: string
          description: IANA timezone (e.g. `Europe/Zurich`).
          minLength: 1
          maxLength: 64
        locationText: { type: [string, 'null'], maxLength: 500 }
        creatorEmail: { type: string, format: email }
        defaultLocale:
          type: string
          minLength: 2
          maxLength: 10
          default: en
        visibility:
          type: string
          enum: [link_only, public]
          default: link_only

    EventUpdateInput:
      type: object
      description: All fields are optional; omit a field to leave it unchanged.
      properties:
        title: { type: string, minLength: 1, maxLength: 200 }
        description: { type: [string, 'null'], maxLength: 5000 }
        startsAt: { type: string, format: date-time }
        endsAt: { type: [string, 'null'], format: date-time }
        timezone: { type: string, minLength: 1, maxLength: 64 }
        locationText: { type: [string, 'null'], maxLength: 500 }
        defaultLocale: { type: string, minLength: 2, maxLength: 10 }
        visibility: { type: string, enum: [link_only, public] }

    EventPublic:
      type: object
      required: [id, slug, title, startsAt, timezone, visibility]
      properties:
        id: { type: string, format: uuid }
        slug: { type: string }
        title: { type: string }
        description: { type: [string, 'null'] }
        startsAt: { type: string, format: date-time }
        endsAt: { type: [string, 'null'], format: date-time }
        timezone: { type: string }
        locationText: { type: [string, 'null'] }
        visibility: { type: string, enum: [link_only, public] }
        defaultLocale: { type: string }
        tier:
          type: [string, 'null']
          enum: [basic, plus, null]
          description: |
            Premium tier when the event is paid, otherwise `null`. Used by
            guest-facing UIs to light up per-tier affordances (named
            plus-ones, custom branding treatment).

    EventManage:
      allOf:
        - $ref: '#/components/schemas/EventPublic'
        - type: object
          required: [creatorEmail, isPaid, paidFeatures, createdAt, updatedAt]
          properties:
            creatorEmail: { type: string, format: email }
            creatorUserId: { type: [string, 'null'], format: uuid }
            isPaid: { type: boolean }
            paidFeatures:
              type: object
              additionalProperties: true
            paymentProvider: { type: [string, 'null'] }
            paymentRef: { type: [string, 'null'] }
            createdAt: { type: string, format: date-time }
            updatedAt: { type: string, format: date-time }

    EventCreateResponse:
      type: object
      required: [event, magicLinkSent]
      properties:
        event: { $ref: '#/components/schemas/EventPublic' }
        magicLinkSent:
          {
            type: boolean,
            description: True if the magic-link email was dispatched. False in dev when RESEND_API_KEY is unset.,
          }
        creatorTokenPreview:
          type: [string, 'null']
          description: |
            Returned only when the email was NOT sent (i.e. dev mode). The
            client may use it to drive UI tests. Never returned in production.

    RsvpInput:
      type: object
      required: [name, status]
      properties:
        name: { type: string, minLength: 1, maxLength: 200 }
        email: { type: [string, 'null'], format: email }
        status: { type: string, enum: [yes, maybe, no] }
        message: { type: [string, 'null'], maxLength: 2000 }
        plusOnes: { type: integer, minimum: 0, maximum: 20, default: 0 }
        plusOnesDetails:
          type: array
          maxItems: 20
          description: |
            Named plus-one entries. Only honoured on Plus-tier events
            (A.6b); on Basic / unpaid events the server drops this field
            and only stores the integer `plusOnes` count.
          items:
            type: object
            required: [name]
            properties:
              name: { type: string, minLength: 1, maxLength: 200 }
        guestId:
          type: [string, 'null']
          format: uuid
          description: Optional link to a pre-invited guest.

    Rsvp:
      type: object
      required: [id, eventId, name, status, plusOnes, plusOnesDetails, respondedAt]
      properties:
        id: { type: string, format: uuid }
        eventId: { type: string, format: uuid }
        guestId: { type: [string, 'null'], format: uuid }
        name: { type: string }
        email: { type: [string, 'null'], format: email }
        status: { type: string, enum: [yes, maybe, no] }
        plusOnes: { type: integer }
        plusOnesDetails:
          type: array
          description: Named plus-one entries — empty for Basic / unpaid events.
          items:
            type: object
            required: [name]
            properties:
              name: { type: string }
        message: { type: [string, 'null'] }
        respondedAt: { type: string, format: date-time }

    GuestInput:
      type: object
      required: [invitedVia]
      properties:
        name: { type: [string, 'null'], maxLength: 200 }
        email: { type: [string, 'null'], format: email }
        phone:
          type: [string, 'null']
          description: E.164 formatted phone number.
          pattern: '^\+?[1-9]\d{1,14}$'
        invitedVia:
          type: string
          enum: [link, email, sms, whatsapp, agent]

    Guest:
      type: object
      required: [id, eventId, invitedVia, invitedAt]
      properties:
        id: { type: string, format: uuid }
        eventId: { type: string, format: uuid }
        name: { type: [string, 'null'] }
        email: { type: [string, 'null'], format: email }
        phone: { type: [string, 'null'] }
        invitedVia: { type: string }
        invitedAt: { type: string, format: date-time }

    UserProfile:
      type: object
      required: [id, email, emailVerified, locale, timezone, createdAt]
      properties:
        id: { type: string, format: uuid }
        email: { type: string, format: email }
        emailVerified: { type: boolean }
        name: { type: [string, 'null'] }
        image: { type: [string, 'null'] }
        locale: { type: string }
        timezone: { type: string }
        createdAt: { type: string, format: date-time }

    UserExport:
      type: object
      required: [exportedAt, user, events, rsvps]
      properties:
        exportedAt: { type: string, format: date-time }
        user: { $ref: '#/components/schemas/UserProfile' }
        events:
          type: array
          items: { $ref: '#/components/schemas/EventPublic' }
        rsvps:
          type: array
          items: { $ref: '#/components/schemas/Rsvp' }

    ClaimResponse:
      type: object
      required: [claimed]
      properties:
        claimed:
          type: integer
          description: Number of events newly linked to this user.

    Media:
      type: object
      required: [id, eventId, kind, mimeType, sizeBytes, position, createdAt]
      properties:
        id: { type: string, format: uuid }
        eventId: { type: string, format: uuid }
        kind: { type: string, enum: [cover, gallery] }
        mimeType: { type: string }
        sizeBytes: { type: integer }
        width: { type: [integer, 'null'] }
        height: { type: [integer, 'null'] }
        position: { type: integer }
        url:
          type: [string, 'null']
          format: uri
          description: Public URL when `MEDIA_PUBLIC_BASE_URL` is configured; null otherwise.
        createdAt: { type: string, format: date-time }

    AuditEntry:
      type: object
      required: [id, action, createdAt]
      properties:
        id: { type: string, format: uuid }
        action:
          { type: string, description: 'e.g. `event.hard_delete`, `reminder.sent`, `rsvp.submit`' }
        eventId: { type: [string, 'null'], format: uuid }
        metadata:
          type: object
          additionalProperties: true
        createdAt: { type: string, format: date-time }

    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              description: Stable error code; maps to a localized message client-side.
            message:
              type: string
              description: Default-language (English) fallback message.
            details:
              type: object
              additionalProperties: true

  responses:
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    ValidationError:
      description: Request body or query parameters failed validation.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Unauthorized:
      description: Missing or invalid creator token.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    InternalServerError:
      description: Unexpected error; captured in Sentry.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
